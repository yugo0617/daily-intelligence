name: Daily Economic Report

on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * 0-3"
      timezone: "Asia/Tokyo"
    - cron: "30 22 * * 4"
      timezone: "Asia/Tokyo"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Generate daily economics report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        run: |
          cd src
          python run.py daily_economics_ja

      - name: Commit report
        run: |
          git config user.name "report-bot"
          git config user.email "report-bot@users.noreply.github.com"
          git add src/reports/
          git diff --cached --quiet || git commit -m "Add daily economics report $(date '+%Y-%m-%d')"
          git push
